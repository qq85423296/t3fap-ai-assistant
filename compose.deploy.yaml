# T3FAP + AI 助手一体部署
# 启动：docker compose -f compose.deploy.yaml up -d

services:
  t3fap:
    image: ghcr.io/qq85423296/t3fap
    container_name: t3fap
    restart: always
    ports:
      - "8521:8521"
    environment:
      TZ: Asia/Shanghai
      T3MT_ENV: production
      T3MT_LOG_LEVEL: INFO
      T3MT_PUBLIC_BASE_URL: http://127.0.0.1:8521
      T3MT_DATABASE_URL: sqlite:////app/storage/runtime/t3mt-next.db
      T3MT_ENABLE_QQBOT_GATEWAY: "0"
    volumes:
      - ./logs:/app/storage/logs
      - ./packages:/app/storage/packages
      - ./runtime:/app/storage/runtime
      - ./downloads:/app/backend/downloads
    security_opt:
      - apparmor:unconfined

  ai-assistant:
    image: ghcr.io/qq85423296/t3fap-ai-assistant:latest
    container_name: t3fap-ai-assistant
    restart: always
    environment:
      T3MT_HOST: http://192.168.0.111:8521
      T3MT_API_KEY: "这里填t3fap 个人密钥 获取的 key"
      T3MT_AUTOMATION_MODE: full-access
      T3MT_CONFIRM_REDLINE_ACTIONS: "true"
      T3FAP_ASSISTANT_MODEL_NAME: gpt-5.4
      T3FAP_ASSISTANT_MODEL: openai/gpt-5.4
      T3FAP_ASSISTANT_API_KEY: "这里填新模型 key"
      T3FAP_ASSISTANT_API_BASE: https://api.openai.com/v1
      T3FAP_ASSISTANT_PICO_TOKEN: ""
      T3FAP_ASSISTANT_FORCE_REGENERATE_CONFIG: "false"
    ports:
      - "18800:18800"
      - "18790:18790"
    volumes:
      - ./assistant-data:/data/picoclaw
