# T3FAP + AI 助手一体部署
# 启动：docker compose -f compose.deploy.yaml up -d
# 必填：
# - T3MT_API_KEY：T3FAP 后台生成的 API Key
# - OPENAI_API_KEY：模型 API Key
# 选填：
# - T3FAP_ASSISTANT_MODEL_NAME / T3FAP_ASSISTANT_MODEL：模型显示名和模型标识
# - T3FAP_ASSISTANT_API_BASE：自定义模型网关地址
# - T3FAP_ASSISTANT_PICO_TOKEN：外部客户端接 Pico 网关时再填

services:
  # T3FAP 主服务
  t3fap:
    image: ghcr.io/qq85423296/t3fap
    container_name: t3fap
    restart: always
    ports:
      # 宿主机端口:容器端口，用于访问 T3FAP Web 界面和 API。
      - "8521:8521"
    environment:
      # 时区
      TZ: Asia/Shanghai

      # 生产环境配置
      T3MT_ENV: production
      T3MT_LOG_LEVEL: INFO

      # 对外访问地址，后面上域名或反代时改这里
      T3MT_PUBLIC_BASE_URL: http://127.0.0.1:8521

      # SQLite 数据库路径
      T3MT_DATABASE_URL: sqlite:////app/storage/runtime/t3mt-next.db

      # 默认关闭 QQBot 网关
      T3MT_ENABLE_QQBOT_GATEWAY: "0"
    volumes:
      # 日志
      - ./logs:/app/storage/logs

      # 插件包和缓存
      - ./packages:/app/storage/packages

      # 运行数据和数据库
      - ./runtime:/app/storage/runtime

      # 下载目录
      - ./downloads:/app/backend/downloads
    security_opt:
      # 当前镜像需要放开 apparmor
      - apparmor:unconfined

  # 基于 PicoClaw 的 AI 助手 sidecar，内置项目专用 skills
  ai-assistant:
    image: ghcr.io/qq85423296/t3fap-ai-assistant:latest
    container_name: t3fap-ai-assistant
    restart: always
    depends_on:
      - t3fap
    environment:
      # Docker 内网访问 T3FAP，不要写 127.0.0.1
      T3MT_HOST: http://t3fap:8521

      # 必填：T3FAP 后台生成的 API Key
      T3MT_API_KEY: "请改成你在 T3FAP 后台生成的 API Key"

      # 自动化模式：
      # full-access = 尽量自动执行，只有红线动作才再次确认
      T3MT_AUTOMATION_MODE: full-access

      # 红线动作是否二次确认：重置密钥、批量删除、全量覆盖配置等
      T3MT_CONFIRM_REDLINE_ACTIONS: "true"

      # AI 助手使用的模型名称。
      T3FAP_ASSISTANT_MODEL_NAME: gpt-5.4

      # PicoClaw/LiteLLM 风格模型标识。
      T3FAP_ASSISTANT_MODEL: openai/gpt-5.4

      # 模型 API Key；留空时回退使用 OPENAI_API_KEY
      T3FAP_ASSISTANT_API_KEY: ""
      OPENAI_API_KEY: "请改成你的 OpenAI API Key"

      # 模型 API 地址，接中转或 OneAPI 时改这里
      T3FAP_ASSISTANT_API_BASE: https://api.openai.com/v1

      # 可选：外部客户端连接 Pico 网关时再填
      T3FAP_ASSISTANT_PICO_TOKEN: ""
    ports:
      # PicoClaw 前端控制台，部署后访问 http://你的服务器IP:18800/launcher-setup
      # 建议直接走独立端口或独立子域名，不要挂在 /ai 这类子路径下面
      - "18800:18800"

      # Pico 网关端口
      - "18790:18790"
    volumes:
      # AI 助手数据目录
      - ./assistant-data:/data/picoclaw
