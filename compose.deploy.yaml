# T3FAP + T3FAP AI Assistant deployment.
#
# Usage:
#   1. Copy `.env.deploy.example` to `.env`
#   2. Fill `T3MT_API_KEY` and `OPENAI_API_KEY`
#   3. Run:
#      docker compose -f compose.deploy.yaml --env-file .env up -d
#
# Network note:
#   The assistant calls T3FAP through Docker's internal service DNS:
#   http://t3fap:8521
#
# Image note:
#   If pulling `ghcr.io/qq85423296/t3fap-ai-assistant:latest` fails with
#   a permission error, set the GitHub Container Package visibility to Public.

services:
  # Main T3FAP application.
  t3fap:
    image: ghcr.io/qq85423296/t3fap
    container_name: t3fap
    restart: always
    ports:
      # Host UI/API port -> container UI/API port.
      - "8521:8521"
    environment:
      # Keep logs and scheduled tasks aligned with China time.
      TZ: Asia/Shanghai

      # Production runtime settings.
      T3MT_ENV: production
      T3MT_LOG_LEVEL: INFO

      # Public URL used by the app when generating links.
      # Change this to your domain if deploying behind a reverse proxy.
      T3MT_PUBLIC_BASE_URL: http://127.0.0.1:8521

      # SQLite database stored on the mounted ./runtime volume.
      T3MT_DATABASE_URL: sqlite:////app/storage/runtime/t3mt-next.db

      # Disable QQ bot gateway by default.
      T3MT_ENABLE_QQBOT_GATEWAY: "0"
    volumes:
      # Application logs.
      - ./logs:/app/storage/logs

      # Installed plugin/package cache.
      - ./packages:/app/storage/packages

      # Runtime data, including SQLite database.
      - ./runtime:/app/storage/runtime

      # Backend download output directory.
      - ./downloads:/app/backend/downloads
    security_opt:
      # Required by the current T3FAP container runtime behavior.
      - apparmor:unconfined

  # PicoClaw-based sidecar assistant with bundled T3MT skills.
  ai-assistant:
    image: ghcr.io/qq85423296/t3fap-ai-assistant:latest
    container_name: t3fap-ai-assistant
    restart: always
    depends_on:
      - t3fap
    environment:
      # Internal Docker service URL for T3FAP.
      T3MT_HOST: http://t3fap:8521

      # API key generated from the T3FAP app. Required.
      T3MT_API_KEY: ${T3MT_API_KEY}

      # Whitelisted operations can run automatically; destructive actions still
      # require confirmation according to the bundled sidecar automation skill.
      T3MT_AUTOMATION_MODE: whitelist

      # Assistant model settings. OPENAI_API_KEY is used as fallback if
      # T3FAP_ASSISTANT_API_KEY is empty.
      T3FAP_ASSISTANT_MODEL_NAME: ${T3FAP_ASSISTANT_MODEL_NAME:-gpt-5.4}
      T3FAP_ASSISTANT_MODEL: ${T3FAP_ASSISTANT_MODEL:-openai/gpt-5.4}
      T3FAP_ASSISTANT_API_KEY: ${T3FAP_ASSISTANT_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      T3FAP_ASSISTANT_API_BASE: ${T3FAP_ASSISTANT_API_BASE:-https://api.openai.com/v1}

      # Optional Pico channel token. Set this if you expose/use PicoClaw's Pico
      # websocket channel from another client.
      T3FAP_ASSISTANT_PICO_TOKEN: ${T3FAP_ASSISTANT_PICO_TOKEN:-}
    ports:
      # PicoClaw gateway port.
      - "18790:18790"
    volumes:
      # Assistant config, workspace, sessions, memory, and copied skills.
      - ./assistant-data:/data/picoclaw
