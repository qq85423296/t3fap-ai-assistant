services:
  t3fap:
    image: ghcr.io/qq85423296/t3fap:latest
    container_name: t3fap
    restart: unless-stopped
    ports:
      - "8521:8521"

  ai-assistant:
    build:
      context: .
      args:
        PICOCLAW_REF: main
    image: t3fap-ai-assistant:local
    container_name: t3fap-ai-assistant
    restart: unless-stopped
    depends_on:
      - t3fap
    environment:
      T3MT_HOST: http://t3fap:8521
      T3MT_API_KEY: "请改成你在 T3FAP 后台生成的 API Key"
      T3MT_AUTOMATION_MODE: full-access
      T3MT_CONFIRM_REDLINE_ACTIONS: "true"
      T3FAP_ASSISTANT_MODEL_NAME: gpt-5.4
      T3FAP_ASSISTANT_MODEL: openai/gpt-5.4
      T3FAP_ASSISTANT_API_KEY: ""
      OPENAI_API_KEY: "请改成你的 OpenAI API Key"
      T3FAP_ASSISTANT_API_BASE: https://api.openai.com/v1
      T3FAP_ASSISTANT_PICO_TOKEN: ""
      T3FAP_ASSISTANT_FORCE_REGENERATE_CONFIG: "false"
    ports:
      - "18800:18800"
      - "18790:18790"
    volumes:
      - t3fap-ai-assistant-data:/data/picoclaw

volumes:
  t3fap-ai-assistant-data:
